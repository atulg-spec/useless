<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Important Notice ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }
    .fade-in-up { animation: fadeInUp 0.55s ease both; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .shake-anim { animation: shake 0.4s ease; }
    .pop-in { animation: popIn 0.45s cubic-bezier(.47,1.64,.41,.8) both; }
    .wiggle-anim { animation: wiggle 0.4s ease; }
    .yes-btn {
      position: fixed;
      transition: left 0.28s cubic-bezier(.47,1.64,.41,.8), top 0.28s cubic-bezier(.47,1.64,.41,.8);
      z-index: 100;
    }
    .confetti-piece {
      position: fixed;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-gradient-to-br from-red-50 via-rose-50 to-red-100">

  <!-- PASSWORD SCREEN - Premium Red Theme -->
  <div id="passwordScreen" class="fixed inset-0 flex items-center justify-center z-50 px-4">
    <div class="fade-in-up bg-white/90 backdrop-blur-sm rounded-2xl shadow-2xl p-8 sm:p-12 max-w-sm w-full text-center border border-red-200/80">
      <div class="text-5xl mb-5 float-anim inline-block">🔐</div>
      <h1 class="text-2xl font-bold text-red-800 mb-1">Restricted Area</h1>
      <p class="text-red-400/80 text-sm mb-7">Only authorised people allowed in 😐</p>

      <input
        id="passwordInput"
        type="password"
        placeholder="Password..."
        class="w-full px-4 py-3 rounded-xl border-2 border-red-200 focus:border-red-400 text-red-800 text-center text-base mb-3 transition-all duration-200 bg-white outline-none placeholder:text-red-300"
        onkeydown="if(event.key==='Enter') checkPassword()"
      />

      <p id="errorMsg" class="text-red-500 text-sm mb-3 min-h-[1.2rem] font-medium"></p>

      <button
        onclick="checkPassword()"
        class="w-full py-3 rounded-xl font-semibold text-white text-base transition-all duration-200 hover:scale-105 active:scale-95 shadow-lg bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700"
      >
        Enter →
      </button>

      <p class="text-red-300/70 text-xs mt-5">Hint: Probability 😅</p>
    </div>
  </div>

  <!-- MAIN CONTENT - Elegant Red Theme Background -->
  <div id="mainContent" class="hidden min-h-screen flex flex-col items-center justify-center px-4 py-16 relative">

    <!-- subtle bg blobs in warm red tones -->
    <div class="absolute top-16 left-8 w-40 h-40 rounded-full pointer-events-none opacity-20" style="background: radial-gradient(circle, #ef4444, #dc2626);"></div>
    <div class="absolute bottom-16 right-8 w-40 h-40 rounded-full pointer-events-none opacity-20" style="background: radial-gradient(circle, #f43f5e, #e11d48);"></div>
    <div class="absolute top-1/3 right-1/4 w-56 h-56 rounded-full pointer-events-none opacity-10" style="background: radial-gradient(circle, #b91c1c, #7f1d1d);"></div>

    <!-- CARD - Premium Glassmorphism Red Theme -->
    <div id="mainCard" class="fade-in-up bg-white/85 backdrop-blur-sm rounded-2xl shadow-2xl p-8 sm:p-12 max-w-md w-full text-center border border-red-200/60 relative z-10">

      <!-- DEFAULT STATE -->
      <div id="defaultState">
        <div class="text-5xl mb-5 float-anim inline-block">🤨</div>
        <h2 class="text-xl sm:text-2xl font-bold text-red-800 mb-2 leading-snug">
          Are you gussa from me? 😐
        </h2>
        <p class="text-red-400/80 text-sm mb-8">
          Just say it. I can take it.
        </p>

        <div class="flex gap-4 justify-center flex-wrap">
            <button
            id="yesBtnInline"
            onmouseenter="spawnFloatingYes(this)"
            class="py-3 px-7 rounded-xl font-semibold text-white text-base transition-all duration-200 hover:scale-105 shadow-md bg-gradient-to-r from-green-600 to-green-600 hover:from-green-700 hover:to-green-700"
          >
            Yes 😤
          </button>

          <button
            id="noBtn"
            onclick="handleNo()"
            class="py-3 px-7 rounded-xl font-semibold text-white text-base transition-all duration-200 hover:scale-110 active:scale-95 shadow-md bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700"
          >
            No 😊
          </button>
        </div>

        <p class="text-red-300/60 text-xs mt-7 italic">Choose it wisely 👀</p>
      </div>

      <!-- SUCCESS STATE - Red theme success glow -->
      <div id="successState" class="hidden">
        <div class="text-5xl mb-5 inline-block pop-in">😌</div>
        <h2 class="text-xl sm:text-2xl font-bold text-red-700 mb-3 fade-in-up" style="animation-delay:0.1s;">
          Dekha, I knew it.
        </h2>
        <p class="text-red-500/90 text-base mb-2 fade-in-up" style="animation-delay:0.2s;">
          Sabash
        </p>
        <div class="mt-7 flex justify-center gap-3 text-3xl fade-in-up" style="animation-delay:0.5s;">
          <span>🎉</span><span>😎</span><span>🎉</span>
        </div>
        <button
          onclick="resetPage()"
          class="mt-8 py-2 px-5 rounded-xl font-medium text-red-500 border border-red-200 text-sm hover:bg-red-50 transition-all duration-200 hover:scale-105"
        >
          Reset 🔄
        </button>
      </div>

    </div>

    <p class="text-red-400/60 text-xs mt-6 fade-in-up">made by someone who is definitely not worried 😐</p>
  </div>

  <!-- FLOATING YES BUTTON - Premium red gradient -->
  <button
    id="yesBtn"
    class="yes-btn hidden py-3 px-7 rounded-xl font-semibold text-white text-base shadow-xl bg-gradient-to-r from-green-600 to-green-600 hover:from-green-700 hover:to-green-700"
    onmouseenter="teleportYes()"
    onclick="teleportYes()"
  >
    Yes 😤
  </button>

  <script>
    const CORRECT_PASSWORD = "ptanhi";
    let yesBtnSpawned = false;

    function checkPassword() {
      const input = document.getElementById("passwordInput");
      const errorMsg = document.getElementById("errorMsg");
      const val = input.value.trim().toLowerCase();

      if (val === CORRECT_PASSWORD) {
        const screen = document.getElementById("passwordScreen");
        screen.style.transition = "opacity 0.5s ease";
        screen.style.opacity = "0";
        setTimeout(() => {
          screen.classList.add("hidden");
          const main = document.getElementById("mainContent");
          main.classList.remove("hidden");
          main.style.opacity = "0";
          main.style.transition = "opacity 0.5s ease";
          setTimeout(() => main.style.opacity = "1", 40);
        }, 500);
      } else {
        errorMsg.textContent = "Galat password 😤 Soch ke daalna.";
        input.classList.add("shake-anim");
        input.value = "";
        setTimeout(() => input.classList.remove("shake-anim"), 400);
        setTimeout(() => errorMsg.textContent = "", 2500);
      }
    }

    function spawnFloatingYes(inlineBtn) {
      if (yesBtnSpawned) return;
      yesBtnSpawned = true;

      const rect = inlineBtn.getBoundingClientRect();
      const floatBtn = document.getElementById("yesBtn");
      floatBtn.style.left = rect.left + "px";
      floatBtn.style.top = rect.top + "px";
      floatBtn.classList.remove("hidden");
      inlineBtn.style.opacity = "0";
      inlineBtn.style.pointerEvents = "none";

      setTimeout(teleportYes, 80);
    }

    function teleportYes() {
      const btn = document.getElementById("yesBtn");
      const bw = btn.offsetWidth || 120;
      const bh = btn.offsetHeight || 50;
      const margin = 24;

      const newX = Math.random() * (window.innerWidth - bw - margin * 2) + margin;
      const newY = Math.random() * (window.innerHeight - bh - margin * 2) + margin;

      btn.style.left = newX + "px";
      btn.style.top = newY + "px";
      btn.classList.add("wiggle-anim");
      setTimeout(() => btn.classList.remove("wiggle-anim"), 400);
    }

    function handleNo() {
      document.getElementById("defaultState").classList.add("hidden");
      document.getElementById("successState").classList.remove("hidden");
      document.getElementById("yesBtn").classList.add("hidden");
      launchConfetti();
    }

    function launchConfetti() {
      const colors = ["#ef4444","#f43f5e","#e11d48","#dc2626","#f97316","#fb923c","#be123c","#9f1239"];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const p = document.createElement("div");
          p.className = "confetti-piece";
          const size = Math.random() * 7 + 5;
          p.style.cssText = `
            left:${Math.random()*100}vw; top:-15px;
            width:${size}px; height:${size}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            border-radius:${Math.random()>.5?"50%":"3px"};
            animation-duration:${Math.random()*1.5+2}s;
          `;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 4000);
        }, i * 45);
      }
    }

    function resetPage() {
      document.getElementById("successState").classList.add("hidden");
      document.getElementById("defaultState").classList.remove("hidden");
      document.getElementById("yesBtn").classList.add("hidden");
      const inline = document.getElementById("yesBtnInline");
      inline.style.opacity = "1";
      inline.style.pointerEvents = "auto";
      yesBtnSpawned = false;
    }
  </script>
</body>
</html>
